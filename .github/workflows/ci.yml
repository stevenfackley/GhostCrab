name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-configuration-cache

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: app/build/reports/tests/testDebugUnitTest/

      - name: Lint
        run: ./gradlew lint --no-configuration-cache

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

      - name: Detekt
        run: ./gradlew detekt --no-configuration-cache

      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: detekt-report
          path: app/build/reports/detekt/

  release-build:
    name: Release AAB (smoke build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        id: signing
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/ghostcrab-release.jks"
            echo "keystore_path=$GITHUB_WORKSPACE/ghostcrab-release.jks" >> "$GITHUB_OUTPUT"
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build release AAB
        env:
          KEYSTORE_PATH: ${{ steps.signing.outputs.keystore_path }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-configuration-cache

      - name: Upload AAB
        if: steps.signing.outputs.keystore_path != ''
        uses: actions/upload-artifact@v6
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 14
