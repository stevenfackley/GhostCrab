name: iOS + Mac Catalyst Release

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Override build number (defaults to GitHub run number)"
        required: false
        type: string
      skip_macos:
        description: "Skip Mac Catalyst archive + upload"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "ios-v*"

permissions:
  contents: read

jobs:
  testflight:
    name: Archive and upload to TestFlight
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 90
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      WORKING_DIR: ${{ github.workspace }}/ios
      IOS_ARCHIVE_PATH: ${{ github.workspace }}/ios/build/GhostCrab-iOS.xcarchive
      MAC_ARCHIVE_PATH: ${{ github.workspace }}/ios/build/GhostCrab-macOS.xcarchive
      IOS_EXPORT_PATH: ${{ github.workspace }}/ios/build/export-ios
      MAC_EXPORT_PATH: ${{ github.workspace }}/ios/build/export-macos
      EXPORT_OPTIONS: ${{ github.workspace }}/ios/ExportOptions.plist

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Xcode
        run: |
          xcodebuild -version
          xcode-select --print-path

      - name: Install xcodegen if missing
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        working-directory: ${{ env.WORKING_DIR }}
        run: xcodegen generate

      - name: Resolve build number
        id: build_number
        run: |
          if [ -n "${{ inputs.build_number }}" ]; then
            echo "value=${{ inputs.build_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_KEY_P8" > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      # ── iOS ────────────────────────────────────────────────────────────────

      - name: Archive (iOS)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          xcodebuild \
            -project GhostCrab.xcodeproj \
            -scheme GhostCrab \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "${IOS_ARCHIVE_PATH}" \
            CURRENT_PROJECT_VERSION="${{ steps.build_number.outputs.value }}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            archive

      - name: Export IPA (iOS)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "${IOS_ARCHIVE_PATH}" \
            -exportPath "${IOS_EXPORT_PATH}" \
            -exportOptionsPlist "${EXPORT_OPTIONS}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      - name: Upload iOS build to TestFlight
        run: |
          xcrun altool --upload-app \
            -f "${IOS_EXPORT_PATH}/GhostCrab.ipa" \
            -t ios \
            --apiKey "${{ secrets.ASC_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_ISSUER_ID }}"

      # ── Mac Catalyst ───────────────────────────────────────────────────────

      - name: Archive (Mac Catalyst)
        if: inputs.skip_macos != true
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          xcodebuild \
            -project GhostCrab.xcodeproj \
            -scheme GhostCrab \
            -configuration Release \
            -destination "generic/platform=macOS,variant=Mac Catalyst" \
            -archivePath "${MAC_ARCHIVE_PATH}" \
            CURRENT_PROJECT_VERSION="${{ steps.build_number.outputs.value }}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            archive

      - name: Export PKG (Mac Catalyst)
        if: inputs.skip_macos != true
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "${MAC_ARCHIVE_PATH}" \
            -exportPath "${MAC_EXPORT_PATH}" \
            -exportOptionsPlist "${EXPORT_OPTIONS}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      - name: Upload Mac Catalyst build to TestFlight
        if: inputs.skip_macos != true
        run: |
          # Mac Catalyst exports as .pkg, not .ipa. altool's -t flag accepts macos.
          PKG_PATH=$(find "${MAC_EXPORT_PATH}" -maxdepth 1 -name '*.pkg' | head -n1)
          if [ -z "$PKG_PATH" ]; then
            echo "::error::No .pkg found in ${MAC_EXPORT_PATH}"
            exit 1
          fi
          xcrun altool --upload-app \
            -f "$PKG_PATH" \
            -t macos \
            --apiKey "${{ secrets.ASC_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_ISSUER_ID }}"

      # ── Artifacts + cleanup ────────────────────────────────────────────────

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ghostcrab-build-${{ steps.build_number.outputs.value }}
          path: |
            ${{ env.IOS_EXPORT_PATH }}/GhostCrab.ipa
            ${{ env.MAC_EXPORT_PATH }}/*.pkg
            ${{ env.IOS_ARCHIVE_PATH }}/dSYMs
            ${{ env.MAC_ARCHIVE_PATH }}/dSYMs
          if-no-files-found: ignore
          retention-days: 14

      - name: Wipe ASC API key
        if: always()
        run: |
          shred -u "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" 2>/dev/null \
            || rm -f "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8"
