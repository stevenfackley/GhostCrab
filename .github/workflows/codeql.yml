# CodeQL advanced setup.
#
# Replaces GitHub "default setup", whose autobuild step builds the app with
# Gradle and fails on the java-kotlin language: CodeQL's Kotlin extractor only
# supports Kotlin < 2.3.30, but this project is on Kotlin 2.4.0 (bumped 2026-06-10,
# PR #44). That kept the CodeQL pipeline red on every push since mid-June with:
#   KotlinInterceptor$KotlinVersionTooRecentError: Kotlin version 2.4.0 is too
#   recent. CodeQL currently supports versions below 2.3.30
#
# 2026-07-06 update: build-mode "none" did not survive contact either — the
# buildless extractor also rejects Kotlin 2.4, extracts zero Java/Kotlin code,
# and `database finalize` fails with exit 32 ("CodeQL detected code written in
# Java/Kotlin but could not process any of it"). java-kotlin has produced no
# analysis results since mid-June, so it is removed from the matrix to keep the
# remaining languages green. Re-add java-kotlin (build-mode autobuild) once
# CodeQL ships Kotlin 2.4 support (track github/codeql#21938). Note: the
# analyzer version comes from the runner toolcache (2.25.6 as of this change);
# bumping the codeql-action major does not change it.name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "54 4 * * 6"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
