# CodeQL advanced setup.
#
# Replaces GitHub "default setup", whose autobuild step builds the app with
# Gradle and fails on the java-kotlin language: CodeQL's Kotlin extractor only
# supports Kotlin < 2.3.30, but this project is on Kotlin 2.4.0 (bumped 2026-06-10,
# PR #44). That kept the CodeQL pipeline red on every push since mid-June with:
#   KotlinInterceptor$KotlinVersionTooRecentError: Kotlin version 2.4.0 is too
#   recent. CodeQL currently supports versions below 2.3.30
#
# Fix: analyze java-kotlin with build-mode "none" — CodeQL scans source without
# invoking Gradle, so the unsupported-Kotlin autobuild error cannot occur.
# Trade-off: Kotlin source is not extracted until CodeQL ships Kotlin 2.4.0
# support (track github/codeql#21938). Flip java-kotlin back to build-mode
# "autobuild" once it does.
#
# ACTIVATION: this workflow is ignored while CodeQL "default setup" is still
# enabled. After merging, disable default setup so advanced setup takes over:
#   gh api --method PATCH repos/stevenfackley/GhostCrab/code-scanning/default-setup -f state=not-configured
name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "54 4 * * 6"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
